services:
  content-engine:
    build: .
    env_file: .env
    ports:
      - "8100:8100"
    depends_on:
      engine-db:
        condition: service_healthy
    restart: unless-stopped

  engine-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: engine
      POSTGRES_PASSWORD: engine_pass
      POSTGRES_DB: content_engine
    ports:
      - "5433:5432"
    volumes:
      - engine_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engine -d content_engine"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  engine_pgdata:
