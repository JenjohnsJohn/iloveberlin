<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | I&hearts;Berlin Content Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-card { background: #fff; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.2); }
    .login-card h1 { font-size: 20px; color: #1a1a2e; margin-bottom: 8px; text-align: center; }
    .login-card .brand { color: #e94560; font-size: 24px; text-align: center; margin-bottom: 24px; font-weight: 700; }
    .login-card label { display: block; font-size: 13px; font-weight: 600; color: #666; margin-bottom: 6px; }
    .login-card input[type="password"] { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; margin-bottom: 20px; }
    .login-card input[type="password"]:focus { outline: none; border-color: #e94560; box-shadow: 0 0 0 3px rgba(233,69,96,0.1); }
    .login-card button { width: 100%; padding: 12px; background: #e94560; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .login-card button:hover { background: #d63851; }
    .error { background: #f8d7da; color: #721c24; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">I&hearts;Berlin</div>
    <h1>Content Engine Admin</h1>
    <p style="text-align:center; color:#888; font-size:13px; margin-bottom:24px;">Sign in to manage pipelines and content.</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/admin/login">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter admin password" autofocus required>
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
